<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Translate Helper</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg-primary: #f4f1ea;
        --bg-secondary: rgba(255, 252, 247, 0.88);
        --text-primary: #1d1d1b;
        --text-secondary: #61513a;
        --accent-primary: #2f5e78;
        --accent-secondary: #e8dcc8;
        --accent-ghost: #f5eee1;
        --status-bg: #f7efe1;
        --status-error-bg: #fdeaea;
        --status-success-bg: #eaf7ef;
        --border-color: rgba(86, 68, 44, 0.14);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg-primary: #1a1614;
          --bg-secondary: rgba(36, 30, 26, 0.92);
          --text-primary: #e8e0d5;
          --text-secondary: #9a8a7a;
          --accent-primary: #4a8db0;
          --accent-secondary: rgba(255,255,255,0.1);
          --accent-ghost: rgba(255,255,255,0.07);
          --status-bg: rgba(255,255,255,0.05);
          --status-error-bg: rgba(200,60,60,0.15);
          --status-success-bg: rgba(40,120,80,0.15);
          --border-color: rgba(255,255,255,0.1);
        }
      }

      body {
        margin: 0;
        width: 360px;
        background: var(--bg-primary);
        color: var(--text-primary);
        font-family: "SF Pro Text", "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif;
        background-image: radial-gradient(circle at top left, rgba(193, 167, 122, 0.25), transparent 34%);
      }

      .panel {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 16px;
      }

      .card {
        border: 1px solid var(--border-color);
        border-radius: 14px;
        background: var(--bg-secondary);
        box-shadow: 0 12px 28px rgba(72, 49, 17, 0.08);
        padding: 14px;
      }

      h1, h2, p {
        margin: 0;
      }

      h1 {
        font-size: 16px;
        font-weight: 700;
      }

      .subtle {
        color: var(--text-secondary);
        font-size: 12px;
        line-height: 1.5;
      }

      .status {
        margin-top: 8px;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 12px;
        line-height: 1.45;
        background: var(--status-bg);
        color: var(--text-secondary);
      }

      .status[data-tone="error"] {
        background: var(--status-error-bg);
        color: #c05050;
      }

      .status[data-tone="success"] {
        background: var(--status-success-bg);
        color: #3d8c6e;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .quick-action {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 12px;
      }

      button, a.button-link {
        appearance: none;
        border: 0;
        border-radius: 11px;
        padding: 11px 12px;
        font: inherit;
        font-size: 13px;
        cursor: pointer;
        text-align: center;
        text-decoration: none;
      }

      button.primary {
        background: var(--accent-primary);
        color: #fff;
      }

      button.wide {
        width: 100%;
      }

      button.secondary, a.button-link {
        background: var(--accent-secondary);
        color: var(--text-primary);
      }

      button.ghost {
        background: var(--accent-ghost);
        color: var(--text-primary);
      }

      button:disabled {
        opacity: 0.55;
        cursor: default;
      }

      .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .meta {
        font-size: 12px;
        color: var(--text-secondary);
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <section class="card">
        <h1>Translate Helper</h1>
        <p class="subtle">通过本地 VS Code 桥接驱动，适用于 Jira、Confluence 等文档类页面。</p>
        <div id="bridge-status" class="status" data-tone="neutral">正在检查桥接状态…</div>
      </section>

      <section class="card">
        <h2 style="font-size: 13px; margin-bottom: 10px;">整页翻译</h2>
        <div class="quick-action">
          <button id="translate-last-mode" class="primary wide">翻译整页</button>
          <p id="quick-mode-hint" class="subtle">使用上次使用的模式。</p>
        </div>
        <div class="controls">
          <button id="translate-translated-only" class="secondary">仅译文</button>
          <button id="translate-bilingual" class="secondary">双语对照</button>
          <button id="translate-selection" class="ghost">翻译选中文字</button>
          <button id="revert-page" class="ghost">还原页面</button>
        </div>
      </section>

      <section class="card footer">
        <div class="meta" id="settings-summary">目标语言：zh-CN</div>
        <a class="button-link" href="options.html" target="_blank" rel="noreferrer">设置</a>
      </section>
    </main>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
